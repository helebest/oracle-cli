services:
  hermes:
    build: .
    image: hermes-agent:custom
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    command: gateway run
    env_file: .env
    volumes:
      - ./data:/opt/data
      - obsidian-vault:/opt/data/vault/secondbrain
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "3.0"

volumes:
  obsidian-vault:
    external: true
    name: obsidian-sync_obsidian-vault
